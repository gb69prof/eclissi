<style>
:root{
  --notte:#05070f; --notte2:#0a1020; --carta:#f0e9d8; --oro:#e8b85c;
  --umbra:#c0503a; --ciano:#9fc4d2; --velo:rgba(10,14,26,.72);

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--notte);color:var(--carta);font-family:var(--sans);overflow:hidden}
#sky{position:fixed;inset:0;width:100%;height:100%;display:block}

/* ----- testata ----- */
header{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:14px;
  padding:10px 16px;background:linear-gradient(180deg,rgba(5,7,15,.92),rgba(5,7,15,0));pointer-events:none}
header>*{pointer-events:auto}
.brand{display:flex;flex-direction:column;line-height:1.05}
.brand b{font-family:var(--serif);font-weight:600;font-size:clamp(17px,2.4vw,23px);letter-spacing:.04em}
.brand span{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--oro);opacity:.9}
nav{display:flex;gap:6px;margin-left:auto}
.tab{font:500 12.5px var(--sans);color:var(--carta);background:rgba(15,22,40,.55);
  border:1px solid rgba(159,196,210,.22);border-radius:999px;padding:7px 14px;cursor:pointer;transition:.2s}
.tab.on{background:rgba(232,184,92,.16);border-color:var(--bordo);color:#f6e9c8}
.tab:hover{border-color:var(--bordo)}
#panelToggle{font-size:16px;background:rgba(15,22,40,.55);color:var(--oro);border:1px solid var(--bordo);
  border-radius:999px;width:34px;height:34px;cursor:pointer}

/* ----- pannello «Cosa stai vedendo» ----- */
#panel{position:fixed;top:64px;right:14px;width:min(390px,calc(100vw - 28px));max-height:calc(100vh - 220px);
  z-index:18;background:var(--velo);backdrop-filter:blur(10px);border:1px solid var(--bordo);
  border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:transform .35s,opacity .35s}
#panel.closed{transform:translateX(calc(100% + 24px));opacity:0;pointer-events:none}
#panelTitle{font-family:var(--serif);font-size:19px;font-weight:600;color:#f4ecd9;
  padding:13px 16px 9px;border-bottom:1px solid rgba(232,184,92,.18);letter-spacing:.02em}

#panelBody p{margin-bottom:10px}
#panelBody b{color:#f6e9c8}
#panelBody .warn{color:#f0b9a6;font-size:12.5px;border-left:2px solid var(--umbra);padding-left:9px}
#panelBody .fine{font-size:11px;color:rgba(228,221,201,.55);margin-top:6px}
.voy{font:600 13px var(--sans);width:100%;margin:4px 0 8px;padding:10px;border-radius:9px;cursor:pointer;
  color:#1a1206;background:linear-gradient(120deg,#e8b85c,#f3d490);border:none;letter-spacing:.02em}
.voy:hover{filter:brightness(1.07)}

/* ----- barra inferiore: filtri + linea del tempo ----- */
#bottom{position:fixed;left:0;right:0;bottom:0;z-index:19;padding:8px 12px 12px;
  background:linear-gradient(0deg,rgba(5,7,15,.95) 55%,rgba(5,7,15,0))}
#filters{display:flex;gap:6px;margin-bottom:7px;align-items:center;flex-wrap:wrap}

#filters .loc{margin-left:auto;font-size:11px;color:rgba(228,221,201,.6);letter-spacing:.04em}
#timeline{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin}
.evcard{flex:0 0 auto;display:flex;flex-direction:column;gap:3px;align-items:flex-start;text-align:left;
  min-width:168px;padding:9px 12px;border-radius:11px;cursor:pointer;border:1px solid rgba(159,196,210,.18);
  background:rgba(13,19,36,.72);color:var(--carta);transition:.15s}
.evcard.sol{border-top:2px solid var(--oro)} .evcard.lun{border-top:2px solid var(--umbra)}
.evcard.sel{background:rgba(232,184,92,.14);border-color:var(--bordo)}
.evcard:hover{border-color:var(--bordo)}
.evdate{font-family:var(--serif);font-size:15.5px;font-weight:600;color:#f4ecd9}
.evtype{font-size:11px;letter-spacing:.05em;color:#cfd8e4}
.badge{font-size:10px;padding:2px 7px;border-radius:999px;letter-spacing:.02em}

.badge.nv{background:rgba(120,130,150,.15);color:#97a3b4}

  display:none;align-items:center;gap:10px;width:min(680px,calc(100vw - 28px));

#readout{font-size:11.5px;color:#e9e2cd;white-space:nowrap;font-variant-numeric:tabular-nums}

<script>
/* =====================================================================
   ATLANTE DELLE ECLISSI · Foggia 2026–2036
   Motore astronomico: algoritmi di Jean Meeus (Astronomical Algorithms)
   - Posizione apparente del Sole (cap. 25)
   - Posizione della Luna, serie ELP-2000 troncata (cap. 47)
   - Tempo siderale, parallasse topocentrica (capp. 12, 40)
   - Geometria delle ombre per eclissi lunari (regola di Danjon)
   Le date delle eclissi provengono dal catalogo NASA (SE5000 / LE5000);
   tutte le circostanze locali sono CALCOLATE dall'app, non copiate.
   ===================================================================== */
'use strict';

/* ------------------------- utilità matematiche ------------------------ */
const DEG = Math.PI / 180, RAD = 180 / Math.PI;
const sin = x => Math.sin(x * DEG), cos = x => Math.cos(x * DEG), tan = x => Math.tan(x * DEG);
const norm360 = x => ((x % 360) + 360) % 360;
const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
const lerp = (a, b, t) => a + (b - a) * t;
const ease = t => t < .5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

function jdFromDate(d) { return d.getTime() / 86400000 + 2440587.5; }
function dateFromJD(jd) { return new Date((jd - 2440587.5) * 86400000); }
function centuries(jd) { return (jd - 2451545.0) / 36525; }

/* --------------------------- Sole (Meeus 25) -------------------------- */
function sunPosition(jd) {
  const T = centuries(jd);
  const L0 = norm360(280.46646 + 36000.76983 * T + 0.0003032 * T * T);
  const M = norm360(357.52911 + 35999.05029 * T - 0.0001537 * T * T);
  const e = 0.016708634 - 0.000042037 * T - 0.0000001267 * T * T;
  const C = (1.914602 - 0.004817 * T - 0.000014 * T * T) * sin(M)
          + (0.019993 - 0.000101 * T) * sin(2 * M)
          + 0.000289 * sin(3 * M);
  const trueLong = L0 + C;
  const v = M + C;
  const R = 1.000001018 * (1 - e * e) / (1 + e * cos(v)); // UA
  const Omega = 125.04 - 1934.136 * T;
  const lambda = trueLong - 0.00569 - 0.00478 * sin(Omega); // longitudine apparente
  const eps = 23.4392911 - 0.0130042 * T - 1.64e-7 * T * T + 0.00256 * cos(Omega);
  const ra = norm360(Math.atan2(cos(eps) * sin(lambda), cos(lambda)) * RAD);
  const dec = Math.asin(sin(eps) * sin(lambda)) * RAD;
  const sd = 0.266563 / R;           // semidiametro in gradi (959.63" / R)
  const par = 8.794 / 3600 / R;      // parallasse solare in gradi
  return { lon: norm360(lambda), ra, dec, R, sd, par, eps, M, L0 };
}

/* --------------------------- Luna (Meeus 47) --------------------------- */
/* Termini principali: [D, M, M', F, ΣL(1e-6 deg), Σr(1e-3 km)] */
const LUNAR_LR = [
  [0,0,1,0, 6288774,-20905355],[2,0,-1,0,1274027,-3699111],[2,0,0,0,658314,-2955968],
  [0,0,2,0,213618,-569925],[0,1,0,0,-185116,48888],[0,0,0,2,-114332,-3149],
  [2,0,-2,0,58793,246158],[2,-1,-1,0,57066,-152138],[2,0,1,0,53322,-170733],
  [2,-1,0,0,45758,-204586],[0,1,-1,0,-40923,-129620],[1,0,0,0,-34720,108743],
  [0,1,1,0,-30383,104755],[2,0,0,-2,15327,10321],[0,0,1,2,-12528,0],
  [0,0,1,-2,10980,79661],[4,0,-1,0,10675,-34782],[0,0,3,0,10034,-23210],
  [4,0,-2,0,8548,-21636],[2,1,-1,0,-7888,24208],[2,1,0,0,-6766,30824],
  [1,0,-1,0,-5163,-8379],[1,1,0,0,4987,-16675],[2,-1,1,0,4036,-12831],
  [2,0,2,0,3994,-10445],[4,0,0,0,3861,-11650],[2,0,-3,0,3665,14403],
  [0,1,-2,0,-2689,-7003],[2,0,-1,2,-2602,0],[2,-1,-2,0,2390,10056],
  [1,0,1,0,-2348,6322],[2,-2,0,0,2236,-9884],[0,1,2,0,-2120,5751],
  [0,2,0,0,-2069,0],[2,-2,-1,0,2048,-4950],[2,0,1,-2,-1773,4130],
  [2,0,0,2,-1595,0],[4,-1,-1,0,1215,-3958],[0,0,2,2,-1110,0],
  [3,0,-1,0,-892,3258],[2,1,1,0,-810,2616],[4,-1,-2,0,759,-1897],
  [0,2,-1,0,-713,-2117],[2,2,-1,0,-700,2354],[2,1,-2,0,691,0],
  [2,-1,0,-2,596,0],[4,0,1,0,549,-1423],[0,0,4,0,537,-1117],
  [4,-1,0,0,520,-1571],[1,0,-2,0,-487,-1739],[2,1,0,-2,-399,0],
  [0,0,2,-2,-381,-4421],[1,1,1,0,351,0],[3,0,-2,0,-340,0],
  [4,0,-3,0,330,0],[2,-1,2,0,327,0],[0,2,1,0,-323,1165],
  [1,1,-1,0,299,0],[2,0,3,0,294,0],[2,0,-1,-2,0,8752]
];
/* Termini di latitudine: [D, M, M', F, Σb(1e-6 deg)] */
const LUNAR_B = [
  [0,0,0,1,5128122],[0,0,1,1,280602],[0,0,1,-1,277693],[2,0,0,-1,173237],
  [2,0,-1,1,55413],[2,0,-1,-1,46271],[2,0,0,1,32573],[0,0,2,1,17198],
  [2,0,1,-1,9266],[0,0,2,-1,8822],[2,-1,0,-1,8216],[2,0,-2,-1,4324],
  [2,0,1,1,4200],[2,1,0,-1,-3359],[2,-1,-1,1,2463],[2,-1,0,1,2211],
  [2,-1,-1,-1,2065],[0,1,-1,-1,-1870],[4,0,-1,-1,1828],[0,1,0,1,-1794],
  [0,0,0,3,-1749],[0,1,-1,1,-1565],[1,0,0,1,-1491],[0,1,1,1,-1475],
  [0,1,1,-1,-1410],[0,1,0,-1,-1344],[1,0,0,-1,-1335],[0,0,3,1,1107],
  [4,0,0,-1,1021],[4,0,-1,1,833],[0,0,1,-3,777],[4,0,-2,1,671],
  [2,0,0,-3,607],[2,0,2,-1,596],[2,-1,1,-1,491],[2,0,-2,1,-451],
  [0,0,3,-1,439],[2,0,2,1,422],[2,0,-3,-1,421],[2,1,-1,1,-366],
  [2,1,0,1,-351],[4,0,0,1,331],[2,-1,1,1,315],[2,-2,0,-1,302],
  [0,0,1,3,-283],[2,1,1,-1,-229],[1,1,0,-1,223],[1,1,0,1,223],
  [0,1,-2,-1,-220],[2,1,-1,-1,-220],[1,0,1,1,-185],[2,-1,-2,-1,181],
  [0,1,2,1,-177],[4,0,-2,-1,176],[4,-1,-1,-1,166],[1,0,1,-1,-164],
  [4,0,1,-1,132],[1,0,-1,-1,-119],[4,-1,0,-1,115],[2,-2,0,1,107]
];

function moonPosition(jd) {
  const T = centuries(jd);
  const Lp = norm360(218.3164477 + 481267.88123421 * T - 0.0015786 * T * T + T*T*T/538841 - T*T*T*T/65194000);
  const D  = norm360(297.8501921 + 445267.1114034 * T - 0.0018819 * T * T + T*T*T/545868 - T*T*T*T/113065000);
  const M  = norm360(357.5291092 + 35999.0502909 * T - 0.0001536 * T * T + T*T*T/24490000);
  const Mp = norm360(134.9633964 + 477198.8675055 * T + 0.0087414 * T * T + T*T*T/69699 - T*T*T*T/14712000);
  const F  = norm360(93.2720950 + 483202.0175233 * T - 0.0036539 * T * T - T*T*T/3526000 + T*T*T*T/863310000);
  const A1 = norm360(119.75 + 131.849 * T);
  const A2 = norm360(53.09 + 479264.290 * T);
  const A3 = norm360(313.45 + 481266.484 * T);
  const E = 1 - 0.002516 * T - 0.0000074 * T * T, E2 = E * E;

  let sumL = 0, sumR = 0, sumB = 0;
  for (const [d, m, mp, f, cl, cr] of LUNAR_LR) {
    const arg = d * D + m * M + mp * Mp + f * F;
    const ee = m === 0 ? 1 : (Math.abs(m) === 1 ? E : E2);
    sumL += cl * ee * sin(arg);
    sumR += cr * ee * cos(arg);
  }
  sumL += 3958 * sin(A1) + 1962 * sin(Lp - F) + 318 * sin(A2);
  for (const [d, m, mp, f, cb] of LUNAR_B) {
    const arg = d * D + m * M + mp * Mp + f * F;
    const ee = m === 0 ? 1 : (Math.abs(m) === 1 ? E : E2);
    sumB += cb * ee * sin(arg);
  }
  sumB += -2235 * sin(Lp) + 382 * sin(A3) + 175 * sin(A1 - F) + 175 * sin(A1 + F)
        + 127 * sin(Lp - Mp) - 115 * sin(Lp + Mp);

  const lon = norm360(Lp + sumL / 1e6);
  const lat = sumB / 1e6;
  const dist = 385000.56 + sumR / 1000; // km
  const par = Math.asin(6378.14 / dist) * RAD;        // parallasse equatoriale (gradi)
  const sd = Math.asin(0.272481 * Math.sin(par * DEG)) * RAD; // semidiametro

  const eps = 23.4392911 - 0.0130042 * T;
  const ra = norm360(Math.atan2(sin(lon) * cos(eps) - tan(lat) * sin(eps), cos(lon)) * RAD);
  const dec = Math.asin(sin(lat) * cos(eps) + cos(lat) * sin(eps) * sin(lon)) * RAD;
  return { lon, lat, dist, par, sd, ra, dec, F, D };
}

/* --------------------- tempo siderale e topocentrico ------------------- */
function gmst(jd) {
  const T = centuries(jd);
  return norm360(280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * T * T - T * T * T / 38710000);
}
function topocentric(ra, dec, parDeg, jd, lat, lonE, hM) {
  const u = Math.atan(0.99664719 * tan(lat));
  const rs = 0.99664719 * Math.sin(u) + (hM / 6378140) * sin(lat);
  const rc = Math.cos(u) + (hM / 6378140) * cos(lat);
  const H = norm360(gmst(jd) + lonE - ra); // angolo orario locale (gradi)
  const spar = sin(parDeg);
  const dA = Math.atan2(-rc * spar * sin(H), cos(dec) - rc * spar * cos(H)) * RAD;
  const ra2 = norm360(ra + dA);
  const dec2 = Math.atan2((sin(dec) - rs * spar) * cos(dA), cos(dec) - rc * spar * cos(H)) * RAD;
  return { ra: ra2, dec: dec2 };
}
function altAz(ra, dec, jd, lat, lonE) {
  const H = norm360(gmst(jd) + lonE - ra);
  const alt = Math.asin(sin(lat) * sin(dec) + cos(lat) * cos(dec) * cos(H)) * RAD;
  const az = norm360(Math.atan2(sin(H), cos(H) * sin(lat) - tan(dec) * cos(lat)) * RAD + 180);
  return { alt, az };
}
function separation(ra1, dec1, ra2, dec2) {
  const c = sin(dec1) * sin(dec2) + cos(dec1) * cos(dec2) * cos(ra1 - ra2);
  return Math.acos(clamp(c, -1, 1)) * RAD;
}

/* --------------- frazione oscurata del disco solare ------------------- */
function solarObscuration(s, rs, rm) {
  if (s >= rs + rm) return { obs: 0, mag: 0 };
  const mag = (rs + rm - s) / (2 * rs);
  if (s <= Math.abs(rm - rs)) return { obs: rm >= rs ? 1 : (rm * rm) / (rs * rs), mag };
  const d1 = (s * s + rs * rs - rm * rm) / (2 * s);
  const d2 = s - d1;
  const A = rs * rs * Math.acos(clamp(d1 / rs, -1, 1)) - d1 * Math.sqrt(Math.max(0, rs * rs - d1 * d1))
          + rm * rm * Math.acos(clamp(d2 / rm, -1, 1)) - d2 * Math.sqrt(Math.max(0, rm * rm - d2 * d2));
  return { obs: clamp(A / (Math.PI * rs * rs), 0, 1), mag };
}

/* ------------- geometria dell'ombra terrestre (eclissi lunari) -------- */
function earthShadow(jd) {
  const s = sunPosition(jd), m = moonPosition(jd);
  const shRA = norm360(s.ra + 180), shDec = -s.dec; // punto antisolare
  const umbra = 1.02 * (0.998340 * m.par - s.sd + s.par);     // raggio in gradi (Danjon)
  const penumbra = 1.02 * (0.998340 * m.par + s.sd + s.par);
  const sep = separation(m.ra, m.dec, shRA, shDec);
  const magU = (umbra + m.sd - sep) / (2 * m.sd);
  const magP = (penumbra + m.sd - sep) / (2 * m.sd);
  return { umbra, penumbra, sep, magU, magP, moon: m, sun: s, shRA, shDec };
}

/* ======================================================================
   CATALOGO ECLISSI 2026–2036  (data e istante del massimo: NASA)
   kind: 'S' solare | 'L' lunare — type indicato dal catalogo globale.
   Tutte le circostanze per Foggia sono ricalcolate dal motore qui sopra.

/* ============= calcolo delle circostanze locali per ogni evento ========= */
function computeSolarLocal(ev) {
  const jd0 = jdFromDate(new Date(ev.d));
  const step1 = 1 / 1440; // 1 minuto
  let best = { obs: 0, mag: 0, jd: jd0, alt: -90 };
  let t1 = null, t4 = null, prevObs = 0;
  for (let jd = jd0 - 4 / 24; jd <= jd0 + 4 / 24; jd += step1) {
    const r = solarSnapshot(jd);
    if (r.obs > 0 && prevObs === 0) t1 = jd;
    if (r.obs === 0 && prevObs > 0 && t1 && !t4) t4 = jd;
    if (r.alt > 0.1 && r.obs > best.obs) best = { ...r, jd };
    prevObs = r.obs;
  }
  // raffinamento a 5 secondi attorno al massimo
  if (best.obs > 0) {
    for (let jd = best.jd - step1; jd <= best.jd + step1; jd += 5 / 86400) {
      const r = solarSnapshot(jd);
      if (r.alt > 0.1 && r.obs > best.obs) best = { ...r, jd };
    }
  }
  const visible = best.obs > 0.005;
  return { visible, maxObs: best.obs, maxMag: best.mag, jdMax: best.jd, altMax: best.alt, azMax: best.az, jd1: t1, jd4: t4 };
}
function solarSnapshot(jd) {
  const s = sunPosition(jd), m = moonPosition(jd);
  const st = topocentric(s.ra, s.dec, s.par, jd, OBSERVER.lat, OBSERVER.lon, OBSERVER.h);
  const mt = topocentric(m.ra, m.dec, m.par, jd, OBSERVER.lat, OBSERVER.lon, OBSERVER.h);
  const aa = altAz(st.ra, st.dec, jd, OBSERVER.lat, OBSERVER.lon);
  const sep = separation(st.ra, st.dec, mt.ra, mt.dec);
  const o = solarObscuration(sep, s.sd, m.sd);
  return { obs: aa.alt > -0.8 ? o.obs : 0, mag: o.mag, alt: aa.alt, az: aa.az, sep, sunSd: s.sd, moonSd: m.sd, sun: s, moon: m, st, mt };
}
function computeLunarLocal(ev) {
  const jd0 = jdFromDate(new Date(ev.d));
  const step = 1 / 1440;
  let best = { magU: -9, jd: jd0 };
  let u1 = null, u4 = null, p1 = null, p4 = null, prevU = -9, prevP = -9;
  for (let jd = jd0 - 5 / 24; jd <= jd0 + 5 / 24; jd += step) {
    const sh = earthShadow(jd);
    if (sh.magP > 0 && prevP <= 0) p1 = jd;
    if (sh.magP <= 0 && prevP > 0 && p1 && !p4) p4 = jd;
    if (sh.magU > 0 && prevU <= 0) u1 = jd;
    if (sh.magU <= 0 && prevU > 0 && u1 && !u4) u4 = jd;
    if (sh.magU > best.magU) best = { magU: sh.magU, magP: sh.magP, jd };
    prevU = sh.magU; prevP = sh.magP;
  }
  const shMax = earthShadow(best.jd);
  const mt = topocentric(shMax.moon.ra, shMax.moon.dec, shMax.moon.par, best.jd, OBSERVER.lat, OBSERVER.lon, OBSERVER.h);
  const aa = altAz(mt.ra, mt.dec, best.jd, OBSERVER.lat, OBSERVER.lon);
  // la fase umbrale è visibile se la Luna è sopra l'orizzonte in qualche momento tra u1 e u4
  let anyAbove = false, altAtMax = aa.alt;
  const lo = u1 || p1 || best.jd - 2 / 24, hi = u4 || p4 || best.jd + 2 / 24;
  for (let jd = lo; jd <= hi; jd += 5 * step) {
    const m = moonPosition(jd);
    const t = topocentric(m.ra, m.dec, m.par, jd, OBSERVER.lat, OBSERVER.lon, OBSERVER.h);
    if (altAz(t.ra, t.dec, jd, OBSERVER.lat, OBSERVER.lon).alt > -0.6) { anyAbove = true; break; }
  }
  const visible = anyAbove && (best.magU > 0 || best.magP > 0.6);
  return { visible, magU: best.magU, magP: best.magP, jdMax: best.jd, altMax: altAtMax, u1, u4, p1, p4 };
}

function planetHelio(p, jd) {
  const T = centuries(jd);
  const a = p.a[0] + p.a[1] * T, e = p.e[0] + p.e[1] * T;
  const L = norm360(p.L[0] + p.L[1] * T), pe = p.pe[0] + p.pe[1] * T;
  const M = norm360(L - pe);
  let Erad = M * DEG;
  for (let i = 0; i < 8; i++) Erad = Erad - (Erad - e * Math.sin(Erad) - M * DEG) / (1 - e * Math.cos(Erad));
  const xv = a * (Math.cos(Erad) - e), yv = a * Math.sqrt(1 - e * e) * Math.sin(Erad);
  const v = Math.atan2(yv, xv) * RAD, r = Math.sqrt(xv * xv + yv * yv);
  const lon = norm360(v + pe);
  return { lon, r, a, e, pe };
}

function typeLabel(ev) {
  const t = ev.type.charAt(0).toUpperCase() + ev.type.slice(1);
  return (ev.kind === 'S' ? 'Sole · ' : 'Luna · ') + t;
}
function localBadge(ev) {
  const L = ev.local;
  if (!L.visible) return '<span class="badge nv">non visibile da Foggia</span>';
  if (ev.kind === 'S') {
    const pct = Math.round(L.maxObs * 100);
    return `<span class="badge vis">${pct}% del Sole coperto a Foggia</span>`;
  }
  if (L.magU > 0) {
    const t = L.magU >= 1 ? 'totale' : 'parziale';
    return `<span class="badge vis">${t} · mag. ${L.magU.toFixed(2)} · visibile da Foggia</span>`;
  }
  return '<span class="badge vis">penombrale · visibile da Foggia</span>';
}

function buildTimeline() {
  timelineEl.innerHTML = '';
  const list = EVENTS.filter(ev => {
    if (state.filter === 'solari') return ev.kind === 'S';
    if (state.filter === 'lunari') return ev.kind === 'L';
    if (state.filter === 'visibili') return ev.local.visible;
    return true;
  });
  for (const ev of list) {
    const card = document.createElement('button');
    card.className = 'evcard ' + (ev.kind === 'S' ? 'sol' : 'lun') + (state.selected === ev ? ' sel' : '');
    card.innerHTML = `<span class="evdate">${fmtDateShort.format(ev.date)}</span>
      <span class="evtype">${typeLabel(ev)}</span>
      ${localBadge(ev)}`;
    card.addEventListener('click', () => selectEvent(ev, true));
    timelineEl.appendChild(card);
  }
  if (!list.length) timelineEl.innerHTML = '<div class="evempty">Nessun evento con questo filtro.</div>';
}

function selectEvent(ev, voyage) {
  state.selected = ev;
  buildTimeline();
  const L = ev.local;
  const lo = (ev.kind === 'S' ? (L.jd1 || L.jdMax - 2 / 24) : (L.p1 || L.jdMax - 3 / 24)) - 20 / 1440;
  const hi = (ev.kind === 'S' ? (L.jd4 || L.jdMax + 2 / 24) : (L.p4 || L.jdMax + 3 / 24)) + 20 / 1440;
  state.groundSpan = { lo, hi };
  state.groundJD = L.jdMax;
  state.simDate = dateFromJD(L.jdMax);
  state.playSpeed = 0;
  if (voyage) startVoyage();
  else { setScene('ground'); }
  updatePanel();
}

  state.scene = s;

}

          : `<p>Da Foggia la Luna sarà sotto l\u2019orizzonte durante le fasi principali: l\u2019eclissi <b>non sarà osservabile</b>. La simulazione resta disponibile.</p>`) +
        `<p>Le eclissi di Luna si guardano a occhio nudo, senza alcuna protezione.</p>`;
    }
    html += `<button class="voy" onclick="window.__voy()">▶ Il Viaggio — dal cosmo a Foggia</button>`;
  } else {
    panelTitle.textContent = 'Tavola III · Il cielo di Foggia';
    html = '<p>Scegli un\u2019eclissi dalla linea del tempo per simulare che cosa vedrebbe un osservatore a Foggia.</p>';
  }
  html += `<p class="fine">Orari in ora locale italiana (Europe/Rome). Catalogo: NASA. Circostanze locali calcolate dal motore astronomico dell\u2019app (Meeus); precisione tipica ±1–2 minuti e ±1–2 punti percentuali di copertura.</p>`;
  panelBody.innerHTML = html;
}
window.__voy = () => { if (state.selected) startVoyage(); };

/* ====================== RENDERING — scena 1: orrery ===================== */
function drawOrrery(now, alpha, zoom) {
  ctx.save();
  if (alpha < 1) ctx.globalAlpha = alpha;
  paintSpace();
  const cx = W / 2, cy = (H - 40) / 2 + 10;
  const margin = Math.min(W, H) / 2 - 30;
  const jd = jdFromDate(state.simDate);
  const rScale = a => state.compressed ? margin * Math.pow(a / 30.2, 0.42) : margin * (a / 30.2);

  ctx.save();
  ctx.translate(cx, cy);
  if (zoom) { ctx.scale(zoom, zoom); }

  // Sole
  const sg = ctx.createRadialGradient(0, 0, 0, 0, 0, 26);
  sg.addColorStop(0, '#fff7df'); sg.addColorStop(0.35, '#ffd978'); sg.addColorStop(1, 'rgba(255,170,60,0)');
  ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(0, 0, 26, 0, 7); ctx.fill();
  ctx.fillStyle = '#ffe9ad'; ctx.beginPath(); ctx.arc(0, 0, 7, 0, 7); ctx.fill();

  let earthXY = null;
  for (const p of PLANETS) {
    const el = planetHelio(p, jd);
    // orbita (ellisse reale campionata, proiezione sull'eclittica)
    ctx.beginPath();
    for (let i = 0; i <= 128; i++) {
      const v = i / 128 * 360;
      const r = el.a * (1 - el.e * el.e) / (1 + el.e * cos(v));
      const lon = v + el.pe;
      const rr = rScale(r);
      const x = rr * cos(lon), y = -rr * sin(lon);
      i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
    }
    ctx.strokeStyle = 'rgba(150,170,200,0.22)'; ctx.lineWidth = 1; ctx.stroke();
    const rr = rScale(el.r);
    const x = rr * cos(el.lon), y = -rr * sin(el.lon);
    const pr = state.compressed ? p.r : Math.max(1.2, p.r * 0.4);
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(x, y, pr, 0, 7); ctx.fill();
    if (p.n === 'Saturno') { ctx.strokeStyle = 'rgba(216,192,138,0.7)'; ctx.lineWidth = 1.4; ctx.beginPath(); ctx.ellipse(x, y, pr * 2, pr * 0.7, -0.4, 0, 7); ctx.stroke(); }
    if (p.n === 'Terra') {
      earthXY = { x, y };
      // la Luna, esagerata per visibilità
      const m = moonPosition(jd), s = sunPosition(jd);
      const mAng = m.lon * DEG; // longitudine eclittica geocentrica reale della Luna
      const md = pr + 7;
      ctx.fillStyle = '#cfc9bd';
      ctx.beginPath(); ctx.arc(x + md * Math.cos(mAng), y - md * Math.sin(mAng), 1.8, 0, 7); ctx.fill();
    }
    ctx.fillStyle = 'rgba(220,230,245,0.75)'; ctx.font = '11px system-ui';
    ctx.fillText(p.n, x + pr + 4, y + 3);
  }
  // allineamento al giorno dell'eclissi selezionata
  if (state.selected && Math.abs(jd - state.selected.local.jdMax) < 1.5 && earthXY) {
    ctx.strokeStyle = 'rgba(232,184,92,0.55)'; ctx.setLineDash([5, 6]); ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(0, 0);
    const k = 1.25; ctx.lineTo(earthXY.x * k, earthXY.y * k); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#e8b85c'; ctx.font = 'italic 12px Georgia';
    ctx.fillText('allineamento', earthXY.x * 1.06 + 8, earthXY.y * 1.06);
  }
  ctx.restore();

  ctx.fillStyle = 'rgba(230,235,245,0.9)'; ctx.font = '600 13px system-ui';
  ctx.fillText(fmtDate.format(state.simDate), 14, H - 14);
  ctx.fillStyle = 'rgba(180,195,215,0.55)'; ctx.font = '11px system-ui';
  ctx.fillText(state.compressed ? 'distanze compresse · dimensioni simboliche' : 'distanze in scala reale · dimensioni simboliche', 14, H - 30);
  ctx.restore();
}

/* ================= scena 2: Terra–Luna e i nodi ========================= */
function drawEarthMoon(now, alpha, zoom) {
  ctx.save();
  if (alpha < 1) ctx.globalAlpha = alpha;
  paintSpace();
  const cx = W / 2, cy = (H - 40) / 2 + 10;
  ctx.save(); ctx.translate(cx, cy); if (zoom) ctx.scale(zoom, zoom);

  const jd = state.selected ? state.selected.local.jdMax : jdFromDate(state.simDate);
  const m = moonPosition(jd), s = sunPosition(jd);
  const R = Math.min(W, H) * 0.30;
  const sunDir = (s.lon + 180) * DEG; // direzione del Sole vista dalla Terra: lon geocentrica del Sole

  // luce solare da un lato
  const lg = ctx.createLinearGradient(-Math.cos(sunDir) * W, Math.sin(sunDir) * W, Math.cos(sunDir) * W, -Math.sin(sunDir) * W);
  lg.addColorStop(0, 'rgba(255,225,160,0.10)'); lg.addColorStop(0.5, 'rgba(255,225,160,0)');
  ctx.fillStyle = lg; ctx.fillRect(-W / 2, -H / 2, W, H);
  // frecce verso il Sole
  ctx.strokeStyle = 'rgba(232,184,92,0.8)'; ctx.lineWidth = 1.5;
  const sx = Math.cos(sunDir), sy = -Math.sin(sunDir);
  for (const off of [-40, 0, 40]) {
    const ox = -sy * off, oy = sx * off;
    ctx.beginPath(); ctx.moveTo(ox + sx * (R + 90), oy + sy * (R + 90)); ctx.lineTo(ox + sx * (R + 40), oy + sy * (R + 40)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox + sx * (R + 90), oy + sy * (R + 90));
    ctx.lineTo(ox + sx * (R + 80) - sy * 5, oy + sy * (R + 80) + sx * 5);
    ctx.lineTo(ox + sx * (R + 80) + sy * 5, oy + sy * (R + 80) - sx * 5);
    ctx.closePath(); ctx.fillStyle = 'rgba(232,184,92,0.8)'; ctx.fill();
  }
  ctx.fillStyle = '#e8b85c'; ctx.font = 'italic 13px Georgia';
  ctx.fillText('verso il Sole', sx * (R + 60) - 30, sy * (R + 60) - 12);

  // orbita lunare con esagerazione dell'inclinazione (proiezione: oscillazione verticale ∝ sin(dist. dal nodo))
  const nodeLon = m.lon - m.F * Math.sign(1); // long. del nodo ascendente ≈ lon - F
  const tiltAmp = R * 0.22;
  ctx.beginPath();
  for (let i = 0; i <= 160; i++) {
    const lonI = i / 160 * 360;
    const x = R * cos(lonI), y = -R * sin(lonI) * 0.96;
    const dz = tiltAmp * sin(lonI - nodeLon);
    i ? ctx.lineTo(x, y - dz * 0.35) : ctx.moveTo(x, y - dz * 0.35);
  }
  ctx.strokeStyle = 'rgba(159,196,210,0.5)'; ctx.lineWidth = 1.4; ctx.stroke();
  // eclittica (piano di riferimento)
  ctx.beginPath(); ctx.ellipse(0, 0, R, R * 0.96, 0, 0, 7);
  ctx.strokeStyle = 'rgba(150,170,200,0.18)'; ctx.setLineDash([3, 5]); ctx.stroke(); ctx.setLineDash([]);

  // nodi
  for (const k of [0, 180]) {
    const x = R * cos(nodeLon + k), y = -R * sin(nodeLon + k) * 0.96;
    ctx.fillStyle = '#c0503a'; ctx.beginPath(); ctx.arc(x, y, 3.5, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(232,200,180,0.85)'; ctx.font = 'italic 12px Georgia';
    ctx.fillText(k === 0 ? 'nodo ☊' : 'nodo ☋', x + 8, y - 6);
  }

  // Terra
  const eg = ctx.createRadialGradient(-6, -6, 2, 0, 0, 16);
  eg.addColorStop(0, '#9cc4e8'); eg.addColorStop(0.6, '#3f6ea0'); eg.addColorStop(1, '#1d3a5f');
  ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(0, 0, 16, 0, 7); ctx.fill();
  // notte della Terra
  ctx.save(); ctx.beginPath(); ctx.arc(0, 0, 16, 0, 7); ctx.clip();
  ctx.fillStyle = 'rgba(4,8,18,0.78)';
  ctx.beginPath(); ctx.arc(-sx * 8, -sy * 8, 16, 0, 7); ctx.fill(); ctx.restore();

  // cono d'ombra della Terra (verso antisolare)
  ctx.save();
  ctx.rotate(Math.atan2(-(-sy), -sx));
  const shG = ctx.createLinearGradient(0, 0, R * 1.15, 0);
  shG.addColorStop(0, 'rgba(10,12,22,0.65)'); shG.addColorStop(1, 'rgba(10,12,22,0)');
  ctx.fillStyle = shG;
  ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(R * 1.15, -4); ctx.lineTo(R * 1.15, 4); ctx.lineTo(0, 16); ctx.closePath(); ctx.fill();
  ctx.restore();

  // Luna alla sua posizione vera (longitudine e latitudine eclittiche reali)
  const lx = R * cos(m.lon), ly = -R * sin(m.lon) * 0.96 - tiltAmp * sin(m.lon - nodeLon) * 0.35;
  ctx.fillStyle = '#d8d2c6'; ctx.beginPath(); ctx.arc(lx, ly, 6, 0, 7); ctx.fill();
  ctx.save(); ctx.beginPath(); ctx.arc(lx, ly, 6, 0, 7); ctx.clip();
  ctx.fillStyle = 'rgba(4,8,18,0.75)'; ctx.beginPath(); ctx.arc(lx - sx * 4, ly - sy * 4, 6, 0, 7); ctx.fill(); ctx.restore();
  ctx.fillStyle = 'rgba(235,240,248,0.9)'; ctx.font = '12px system-ui'; ctx.fillText('Luna', lx + 9, ly + 4);
  // se eclissi solare: piccolo cono dalla Luna verso la Terra
  if (state.selected && state.selected.kind === 'S') {
    ctx.strokeStyle = 'rgba(230,220,200,0.5)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(lx - sx * 2, ly - sy * 2); ctx.lineTo(0, 0); ctx.stroke();
  }
  // latitudine eclittica corrente
  ctx.fillStyle = 'rgba(180,195,215,0.8)'; ctx.font = '11px system-ui';
  ctx.fillText(`latitudine eclittica della Luna: ${m.lat.toFixed(2)}°  ·  distanza dal nodo: ${Math.min(norm360(m.lon-nodeLon), 360-norm360(m.lon-nodeLon)).toFixed(1)}°`, -W / 2 + 14, H / 2 - 16);
  ctx.restore();
  ctx.restore();
}

/* =============== scena 3: la vista dal suolo di Foggia ================== */
function skyTint(sunAlt, obs) {
  // restituisce [alto, basso] del gradiente del cielo
  const dark = clamp(obs > 0.97 ? (obs - 0.97) / 0.03 : 0, 0, 1); // crollo di luce in totalità
  if (sunAlt > 6) {
    const day = clamp(sunAlt / 30, 0, 1);
    let top = [lerp(120, 38, dark) * (0.5 + day * 0.5), lerp(165, 60, dark), lerp(220, 110, dark)];
    let bot = [lerp(190, 90, dark), lerp(210, 120, dark), lerp(235, 160, dark)];
    return { top, bot, stars: dark * 0.9 };
  }
  if (sunAlt > -8) { // crepuscolo
    const t = (sunAlt + 8) / 16;
    const top = [lerp(12, 90, t) , lerp(18, 120, t), lerp(40, 180, t)];
    const bot = [lerp(60, 235, t), lerp(35, 160, t), lerp(50, 110, t)];
    return { top, bot, stars: clamp(1 - t * 1.4, 0, 1) };
  }
  return { top: [7, 10, 22], bot: [14, 18, 36], stars: 1 };
}
function drawGround(now, alpha, zoom) {
  ctx.save();
  if (alpha < 1) ctx.globalAlpha = alpha;
  const ev = state.selected;
  if (!ev) { paintSpace(); ctx.fillStyle = 'rgba(220,228,240,.8)'; ctx.font = '15px Georgia'; ctx.textAlign='center'; ctx.fillText('Scegli un\u2019eclissi dalla linea del tempo.', W/2, H/2); ctx.textAlign='left'; ctx.restore(); return; }
  const jd = state.groundJD || ev.local.jdMax;
  const snap = solarSnapshot(jd);
  const horizonY = H * 0.78;

  let tint, moonInfo = null;
  if (ev.kind === 'S') {
    tint = skyTint(snap.alt, snap.obs);
  } else {
    const sh = earthShadow(jd);
    const mt = topocentric(sh.moon.ra, sh.moon.dec, sh.moon.par, jd, OBSERVER.lat, OBSERVER.lon, OBSERVER.h);
    const aa = altAz(mt.ra, mt.dec, jd, OBSERVER.lat, OBSERVER.lon);
    moonInfo = { sh, alt: aa.alt, az: aa.az };
    tint = skyTint(snap.alt, 0);
  }
  // cielo
  const g = ctx.createLinearGradient(0, 0, 0, horizonY);
  g.addColorStop(0, `rgb(${tint.top.map(Math.round).join(',')})`);
  g.addColorStop(1, `rgb(${tint.bot.map(Math.round).join(',')})`);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, horizonY);
  // stelle
  if (tint.stars > 0.05) {
    ctx.fillStyle = `rgba(235,240,250,${0.85 * tint.stars})`;
    for (const st of state.stars) {
      const y = st.y * horizonY * 0.95;
      ctx.globalAlpha = alpha * tint.stars * (0.3 + st.m * 0.7);
      ctx.fillRect(st.x * W, y, st.m > 0.92 ? 2 : 1, st.m > 0.92 ? 2 : 1);
    }
    ctx.globalAlpha = alpha;
  }

  /* ----- corpi celesti, ingranditi: zoom angolare ~22 px per grado ----- */
  const PX = Math.min(W, H) * 0.55 / 1.1; // px per grado: i dischi (~0,53°) appaiono grandi
  const cx = W / 2, cyRef = horizonY * 0.42;

  if (ev.kind === 'S') {
    const sunR = snap.sunSd * PX, moonR = snap.moonSd * PX;
    // posizione verticale legata all'altezza reale del Sole (schiacciata)
    const sy = clamp(cyRef + (12 - snap.alt) * 2.2, 60, horizonY + 80);
    const sxp = cx;
    if (snap.alt > -1.2) {
      // bagliore
      const glow = ctx.createRadialGradient(sxp, sy, sunR * 0.4, sxp, sy, sunR * (snap.obs > 0.97 ? 2.2 : 5));
      const gi = clamp(1 - snap.obs, 0.05, 1);
      glow.addColorStop(0, `rgba(255,240,200,${0.85 * gi})`);
      glow.addColorStop(1, 'rgba(255,200,120,0)');
      ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(sxp, sy, sunR * 5, 0, 7); ctx.fill();
      if (snap.obs > 0.992 && ev.type !== 'anulare') {
        // CORONA
        ctx.save(); ctx.translate(sxp, sy);
        for (let i = 0; i < 40; i++) {
          const a = i / 40 * Math.PI * 2 + 0.3;
          const len = sunR * (1.5 + 1.3 * Math.abs(Math.sin(i * 2.7)));
          const cg = ctx.createLinearGradient(0, 0, Math.cos(a) * len, Math.sin(a) * len);
          cg.addColorStop(0, 'rgba(246,241,228,0.55)'); cg.addColorStop(1, 'rgba(246,241,228,0)');
          ctx.strokeStyle = cg; ctx.lineWidth = sunR * 0.16;
          ctx.beginPath(); ctx.moveTo(Math.cos(a) * sunR, Math.sin(a) * sunR);
          ctx.lineTo(Math.cos(a) * len, Math.sin(a) * len); ctx.stroke();
        }
        const ig = ctx.createRadialGradient(0, 0, sunR, 0, 0, sunR * 1.7);
        ig.addColorStop(0, 'rgba(248,244,232,0.85)'); ig.addColorStop(1, 'rgba(248,244,232,0)');
        ctx.fillStyle = ig; ctx.beginPath(); ctx.arc(0, 0, sunR * 1.7, 0, 7); ctx.fill();
        ctx.restore();
      }
      // fotosfera con oscuramento al bordo
      const pg = ctx.createRadialGradient(sxp, sy, 0, sxp, sy, sunR);
      pg.addColorStop(0, '#fffbe8'); pg.addColorStop(0.85, '#ffe9a8'); pg.addColorStop(1, '#f7c45e');
      ctx.fillStyle = pg; ctx.beginPath(); ctx.arc(sxp, sy, sunR, 0, 7); ctx.fill();
      // la Luna: offset reale (separazione e angolo di posizione)
      const pa = Math.atan2(sin(snap.mt.ra - snap.st.ra) * cos(snap.mt.dec),
                  cos(snap.st.dec) * sin(snap.mt.dec) - sin(snap.st.dec) * cos(snap.mt.dec) * cos(snap.mt.ra - snap.st.ra));
      const mx = sxp + Math.sin(pa) * snap.sep * PX, my = sy - Math.cos(pa) * snap.sep * PX;
      ctx.fillStyle = snap.obs > 0.992 ? '#05060c' : '#101019';
      ctx.beginPath(); ctx.arc(mx, my, moonR, 0, 7); ctx.fill();
      // anello di fuoco
      if (ev.type === 'anulare' && snap.sep + snap.moonSd < snap.sunSd * 1.02 && snap.obs > 0.9) {
        ctx.strokeStyle = 'rgba(255,235,170,0.95)'; ctx.lineWidth = Math.max(2, (snap.sunSd - snap.moonSd) * PX);
        ctx.beginPath(); ctx.arc(sxp, sy, (sunR + moonR) / 2, 0, 7); ctx.stroke();
      }
      // grani di Baily ai contatti della totalità
      if (ev.type === 'totale' && snap.obs > 0.985 && snap.obs < 0.999) {
        const ba = Math.atan2(sy - my, sxp - mx);
        ctx.fillStyle = '#fff7da';
        for (let i = -2; i <= 2; i++) {
          ctx.beginPath(); ctx.arc(mx + Math.cos(ba + i * 0.18) * moonR, my + Math.sin(ba + i * 0.18) * moonR, 2.2 - Math.abs(i) * 0.5, 0, 7); ctx.fill();
        }
      }
    }
  } else if (moonInfo) {
    const { sh } = moonInfo;
    const moonR = sh.moon.sd * PX;
    const my = clamp(cyRef + (12 - moonInfo.alt) * 2.0, 70, horizonY + 80);
    const mx = cx;
    if (moonInfo.alt > -1.5) {
      // posizione dell'ombra rispetto alla Luna (angolo di posizione reale)
      const pa = Math.atan2(sin(sh.shRA - sh.moon.ra) * cos(sh.shDec),
                  cos(sh.moon.dec) * sin(sh.shDec) - sin(sh.moon.dec) * cos(sh.shDec) * cos(sh.shRA - sh.moon.ra));
      const ux = mx + Math.sin(pa) * sh.sep * PX, uy = my - Math.cos(pa) * sh.sep * PX;
      const uR = sh.umbra * PX, pR = sh.penumbra * PX;
      // alone lunare
      const hg = ctx.createRadialGradient(mx, my, moonR, mx, my, moonR * 3);
      hg.addColorStop(0, `rgba(220,225,235,${0.25 * clamp(1 - Math.max(0, sh.magU), 0.15, 1)})`); hg.addColorStop(1, 'rgba(220,225,235,0)');
      ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(mx, my, moonR * 3, 0, 7); ctx.fill();
      // disco lunare con "mari"
      const mg = ctx.createRadialGradient(mx - moonR * 0.3, my - moonR * 0.3, moonR * 0.2, mx, my, moonR);
      mg.addColorStop(0, '#e8e4da'); mg.addColorStop(1, '#b9b2a4');
      ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mx, my, moonR, 0, 7); ctx.fill();
      ctx.save(); ctx.beginPath(); ctx.arc(mx, my, moonR, 0, 7); ctx.clip();
      ctx.fillStyle = 'rgba(120,115,105,0.35)';
      const seas = [[-0.3,-0.25,0.34],[0.18,-0.05,0.26],[0.05,0.3,0.2],[-0.15,0.18,0.14],[0.38,0.22,0.12]];
      for (const [ox, oy, r] of seas) { ctx.beginPath(); ctx.arc(mx + ox * moonR, my + oy * moonR, r * moonR, 0, 7); ctx.fill(); }
      // penombra
      const pen = ctx.createRadialGradient(ux, uy, uR * 0.9, ux, uy, pR);
      pen.addColorStop(0, 'rgba(20,16,20,0.45)'); pen.addColorStop(1, 'rgba(20,16,20,0)');
      ctx.fillStyle = pen; ctx.beginPath(); ctx.arc(ux, uy, pR, 0, 7); ctx.fill();
      // umbra rossa
      const um = ctx.createRadialGradient(ux, uy, 0, ux, uy, uR);
      um.addColorStop(0, 'rgba(38,8,6,0.97)'); um.addColorStop(0.75, 'rgba(90,22,12,0.95)'); um.addColorStop(1, 'rgba(150,55,25,0.85)');
      ctx.fillStyle = um; ctx.beginPath(); ctx.arc(ux, uy, uR, 0, 7); ctx.fill();
      ctx.restore();
      // contorno tenue dell'ombra fuori dal disco (didattico)
      ctx.strokeStyle = 'rgba(192,80,58,0.25)'; ctx.setLineDash([4, 6]);
      ctx.beginPath(); ctx.arc(ux, uy, uR, 0, 7); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(232,200,180,0.5)'; ctx.font = 'italic 11px Georgia';
      ctx.fillText('ombra della Terra', ux - 40, uy - uR - 8);
    } else {
      ctx.fillStyle = 'rgba(220,228,240,.75)'; ctx.font = '14px Georgia'; ctx.textAlign='center';
      ctx.fillText('In questo istante la Luna è sotto l\u2019orizzonte di Foggia.', W/2, H*0.35); ctx.textAlign='left';
    }
  }

  /* --------- il Tavoliere: orizzonte di Foggia --------- */
  const lg = ctx.createLinearGradient(0, horizonY - 10, 0, H);
  const duskF = ev.kind === 'S' ? clamp(1 - (snap.obs > 0.97 ? 1 : snap.obs * 0.6) , 0.12, 1) * clamp((snap.alt + 8) / 20, 0.08, 1) : 0.10;
  lg.addColorStop(0, `rgba(${Math.round(92*duskF+8)},${Math.round(74*duskF+8)},${Math.round(40*duskF+12)},1)`);
  lg.addColorStop(1, `rgba(${Math.round(40*duskF+4)},${Math.round(32*duskF+5)},${Math.round(18*duskF+8)},1)`);
  ctx.fillStyle = lg; ctx.fillRect(0, horizonY - 4, W, H - horizonY + 4);
  // skyline minimale: campanile della Cattedrale di Foggia + case
  ctx.fillStyle = 'rgba(8,9,16,0.88)';
  const bx = W * 0.16;
  ctx.fillRect(bx, horizonY - 58, 14, 58);                  // campanile
  ctx.beginPath(); ctx.moveTo(bx - 2, horizonY - 58); ctx.lineTo(bx + 7, horizonY - 74); ctx.lineTo(bx + 16, horizonY - 58); ctx.closePath(); ctx.fill();
  ctx.fillRect(bx + 22, horizonY - 26, 46, 26);
  ctx.fillRect(bx - 38, horizonY - 18, 30, 18);
  ctx.fillRect(W * 0.78, horizonY - 14, 60, 14);
  // spighe del Tavoliere in primo piano
  ctx.strokeStyle = 'rgba(10,11,18,0.9)'; ctx.lineWidth = 1.4;
  for (let i = 0; i < 60; i++) {
    const x = (i / 60) * W + Math.sin(i * 7) * 6;
    const hgt = 16 + (i * 37 % 23);
    const sway = Math.sin(now / 900 + i) * 2.5;
    ctx.beginPath(); ctx.moveTo(x, H); ctx.quadraticCurveTo(x + sway, H - hgt * 0.6, x + sway * 1.6, H - hgt); ctx.stroke();
    ctx.beginPath(); ctx.arc(x + sway * 1.6, H - hgt, 1.6, 0, 7); ctx.stroke();
  }
  /* --------- letture --------- */
  if (state.scene === 'ground' && !state.voyage) {
    const d = dateFromJD(jd);
    let txt;
    if (ev.kind === 'S') {
      txt = `${fmtTime.format(d)} · Sole coperto: ${(snap.obs * 100).toFixed(1)}% · altezza ${snap.alt.toFixed(1)}° · azimut ${snap.az.toFixed(0)}°`;
    } else {
      txt = `${fmtTime.format(d)} · magnitudine umbrale: ${Math.max(0, moonInfo.sh.magU).toFixed(2)} · Luna a ${moonInfo.alt.toFixed(1)}°`;
    }
    readout.textContent = txt;
    if (state.groundSpan) scrub.value = Math.round(1000 * (jd - state.groundSpan.lo) / (state.groundSpan.hi - state.groundSpan.lo));
  }
  ctx.restore();
}

/* --------------------------- sfondo cosmico ---------------------------- */
function paintSpace() {
  const g = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
  g.addColorStop(0, '#0a1020'); g.addColorStop(1, '#05070f');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(225,232,245,0.7)';
  for (const st of state.starsFar) {
    ctx.globalAlpha = 0.25 + st.m * 0.55;
    ctx.fillRect(st.x * W, st.y * H, st.m > 0.9 ? 2 : 1, st.m > 0.9 ? 2 : 1);
  }
  ctx.globalAlpha = 1;
}

/* ------------------------------ loop ----------------------------------- */
let lastT = performance.now();
function frame(now) {
  const dt = Math.min(0.1, (now - lastT) / 1000); lastT = now;
  if (!W) resize();

  if (state.playSpeed && state.scene === 'orrery' && !state.voyage)
    state.simDate = new Date(state.simDate.getTime() + state.playSpeed * dt * 86400000);
  if (state.groundPlay && state.groundSpan) {
    const span = state.groundSpan.hi - state.groundSpan.lo;
    state.groundJD += dt * span / 35; // tutta l'eclissi in ~35 s
    if (state.groundJD > state.groundSpan.hi) { state.groundJD = state.groundSpan.hi; state.groundPlay = false; $('playBtn').textContent = '▶'; }
  }

  if (state.voyage) {
    const el = now - state.voyage.t0;
    let acc = 0, ph = 0;
    for (; ph < VOY.length; ph++) { if (el < acc + VOY[ph].dur) break; acc += VOY[ph].dur; }
    if (ph >= VOY.length) { state.voyage = null; setScene('ground'); }
    else {
      const local = (el - acc) / VOY[ph].dur;
      const zoomIn = 1 + ease(clamp(local * 1.15 - 0.15, 0, 1)) * 1.6;
      const fade = local > 0.82 ? 1 - (local - 0.82) / 0.18 : 1;
      const sc = VOY[ph].scene;
      if (sc === 'orrery') drawOrrery(now, fade, zoomIn);
      else if (sc === 'earthmoon') drawEarthMoon(now, fade, 0.8 + zoomIn * 0.2);
      else drawGround(now, Math.min(1, local * 3), null);
      // didascalia
      ctx.fillStyle = 'rgba(5,8,16,0.55)'; ctx.fillRect(0, H - 76, W, 44);
      ctx.fillStyle = '#f0e9d8'; ctx.font = 'italic 16px Georgia'; ctx.textAlign = 'center';
      ctx.fillText(VOY[ph].cap, W / 2, H - 48); ctx.textAlign = 'left';
      requestAnimationFrame(frame); return;
    }
  }

  if (state.scene === 'orrery') drawOrrery(now, 1, null);
  else if (state.scene === 'earthmoon') drawEarthMoon(now, 1, null);
  else drawGround(now, 1, null);
  requestAnimationFrame(frame);
}

/* ------------------------------ avvio ----------------------------------- */
resize();
buildTimeline();
updatePanel();
panelEl.classList.toggle('closed', !state.panelOpen);
// selezione iniziale: la prima eclissi futura visibile da Foggia
const firstVis = EVENTS.find(e => e.local.visible && e.date > new Date()) || EVENTS.find(e => e.local.visible);
if (firstVis) { state.selected = firstVis; const L = firstVis.local;
  state.groundSpan = { lo: (firstVis.kind==='S'?(L.jd1||L.jdMax-2/24):(L.p1||L.jdMax-3/24)) - 20/1440,
                       hi: (firstVis.kind==='S'?(L.jd4||L.jdMax+2/24):(L.p4||L.jdMax+3/24)) + 20/1440 };
  state.groundJD = L.jdMax; buildTimeline(); updatePanel();
}
requestAnimationFrame(frame);

/* PWA: registrazione del service worker (solo se servito via https) */
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

</script>
